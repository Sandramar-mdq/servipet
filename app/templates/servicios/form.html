{% extends "base.html" %}
{% block title %}{{ 'Editar' if servicio else 'Nuevo' }} Servicio — Servipet{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Editar' if servicio else 'Nuevo' }} Servicio</h1>

    <form method="post" action="/page/servicios{{ '/' ~ servicio.id ~ '/editar' if servicio else '/nuevo' }}" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input type="text" name="nombre" value="{{ servicio.nombre if servicio else '' }}" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripcion</label>
            <textarea name="descripcion" rows="3" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">{{ servicio.descripcion if servicio else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Precio Base *</label>
            <input type="number" step="0.01" name="precio_base" value="{{ servicio.precio_base if servicio else '0' }}" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium">Guardar</button>
            <a href="/page/servicios" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition text-sm font-medium">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
