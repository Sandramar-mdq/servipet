{% extends "base.html" %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente — Servipet{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Editar' if cliente else 'Nuevo' }} Cliente</h1>

    <form method="post" action="/page/clientes{{ '/' ~ cliente.id ~ '/editar' if cliente else '/nuevo' }}" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input type="text" name="nombre" value="{{ cliente.nombre if cliente else '' }}" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Telefono</label>
                <input type="text" name="telefono" value="{{ cliente.telefono if cliente else '' }}" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ cliente.email if cliente else '' }}" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
            <textarea name="notas" rows="3" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">{{ cliente.notas if cliente else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Foto (WebP)</label>
            <input type="file" accept="image/*" id="foto-input" class="w-full border rounded-lg px-3 py-2 text-sm">
            <input type="hidden" name="foto_webp" id="foto_webp" value="{{ cliente.foto_webp if cliente else '' }}">
            {% if cliente and cliente.foto_webp %}
            <img src="data:image/webp;base64,{{ cliente.foto_webp }}" class="mt-2 w-24 h-24 object-cover rounded-lg">
            {% endif %}
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium">Guardar</button>
            <a href="/page/clientes" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition text-sm font-medium">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/foto.js"></script>
<script>
    initFoto('foto-input', 'foto_webp');
</script>
{% endblock %}
