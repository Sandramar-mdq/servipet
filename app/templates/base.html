<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Servipet{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Servipet">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
    <meta name="description" content="PWA de gestion para lavaderos y comercios de mascotas">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar mobile-first -->
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">Servipet</a>

            <!-- Desktop nav -->
            <div class="hidden md:flex gap-4 text-sm font-medium">
                <a href="/page/clientes" class="hover:text-indigo-200 transition">Clientes</a>
                <a href="/page/mascotas" class="hover:text-indigo-200 transition">Mascotas</a>
                <a href="/page/servicios" class="hover:text-indigo-200 transition">Servicios</a>
                <a href="/page/atenciones" class="hover:text-indigo-200 transition">Atenciones</a>
            </div>

            <!-- Mobile hamburger -->
            <button id="menu-btn" class="md:hidden text-2xl leading-none" aria-label="Menu">&#9776;</button>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-indigo-500 px-4 pb-3 space-y-2 text-sm font-medium">
            <a href="/page/clientes" class="block py-1 hover:text-indigo-200 transition">Clientes</a>
            <a href="/page/mascotas" class="block py-1 hover:text-indigo-200 transition">Mascotas</a>
            <a href="/page/servicios" class="block py-1 hover:text-indigo-200 transition">Servicios</a>
            <a href="/page/atenciones" class="block py-1 hover:text-indigo-200 transition">Atenciones</a>
        </div>
    </nav>

    <!-- Flash messages -->
    {% if success %}
    <div class="max-w-7xl mx-auto mt-4 px-4">
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded text-sm">
            {{ success }}
        </div>
    </div>
    {% endif %}
    {% if error %}
    <div class="max-w-7xl mx-auto mt-4 px-4">
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm">
            {{ error }}
        </div>
    </div>
    {% endif %}

    <!-- Install banner -->
    <div id="install-banner" class="hidden max-w-7xl mx-auto mt-4 px-4">
        <div class="bg-indigo-50 border border-indigo-300 rounded-lg px-4 py-3 flex items-center justify-between">
            <span class="text-sm text-indigo-800">Instalar Servipet en tu dispositivo</span>
            <div class="flex gap-2">
                <button id="install-btn" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm hover:bg-indigo-700 transition">Instalar</button>
                <button id="install-dismiss" class="text-indigo-400 hover:text-indigo-600 text-sm">&times;</button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script>
        // Mobile menu toggle
        document.getElementById('menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(function() {});
        }

        // PWA Install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
            }
            document.getElementById('install-banner').classList.add('hidden');
        });

        document.getElementById('install-dismiss').addEventListener('click', function() {
            document.getElementById('install-banner').classList.add('hidden');
        });

        window.addEventListener('appinstalled', function() {
            document.getElementById('install-banner').classList.add('hidden');
            deferredPrompt = null;
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
